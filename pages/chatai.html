<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Experience</title>
    <link rel="stylesheet" href="../style/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="ai-body">
    <div class="chat-wrapper">
        <header class="chat-header">
            <h2>Gemini AI Assistant</h2>
            <p>Halo, <span id="display-username">User</span>! Ada yang bisa dibantu?</p>
        </header>

        <div id="chat-container" class="chat-container">
            <div class="bot-msg">
                <p>Halo! Saya adalah AI. Silakan ketik pertanyaanmu di bawah.</p>
            </div>
        </div>

        <div class="chat-input-area">
            <input type="text" id="user-input" placeholder="Tulis pesan di sini..." autocomplete="off">
            <button id="send-btn" class="send-btn">
                <img src="../assets/images/sent.jpg" alt="kirim" class="send">
            </button>
        </div>
    </div>

    <script src="../js/ai.js"></script>
</body>
</html>
