<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../style/style.css">
</head>
<body class="login">
    <div class="boxlogin">
        <h2>Hai!</h2>
        <p>Silahkan Login dulu ya!</p>
        <div class="formlogin">
            <form id="form-login" action="">
                <div class="input-group">
                    <img src="../assets/images/user.png" alt="" class="icon">
                    <input name="username" type="text" placeholder="Username" class="input">
                </div>
                <div class="input-group">
                    <img src="../assets/images/pw.png" alt="" class="icon-right">
                    <input name="password" type="password" placeholder="Password" class="input">
                </div>
                <button type="submit" class="loginbtn">Login</button>
            </form>
            <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
            <script src="../js/login.js"></script>
        </div>
    </div>
</body>
</html>
