<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="..style/style.css">
</head>
<body class="register">
    <div class="gambartangan">
        <img src="/assets/images/tangan.jpg" alt="" class="tangan">
    </div>
    <div class="boxregister">
        <div class="inputfield">
            <label>Username</label>
            <img src="../assets/images/pfp.png" alt="" class="ikon1">
            <input type="text" name="username" placeholder="Masukkan Username" required>
        </div>
        <div class="inputfield">
            <label>Alamat Email</label>
            <img src="assets/images/email.png" alt="" class="ikon2">
            <input type="email" name="email" placeholder="Masukkan Email" required>
        </div>
        <div class="inputfield">
            <label>Tanggal Lahir</label>
            <img src="../assets/images/date.png" alt="" class="ikon3">
            <input type="date" name="tgl_lahir" required>
        </div>
        <div class="inputfield">
            <label>Password</label>
            <img src="assets/images/pw.png" alt="" class="ikon4">
            <input type="password" name="password" placeholder="Masukkan Password" required>
        </div>
        <div class="inputfield">
            <label>Konfirmasi Password</label>
            <img src="../assets/images/pw.png" alt="" class="ikon5">
            <input type="password" name="re_password" placeholder="Ulangi Password" required>
        </div>
        <a href="../pages/login.html">
            <button type="submit" class="btn">Register</button>
        </a>
    </div>
</body>
</html>
